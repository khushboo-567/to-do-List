<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/font-awesome.min.css">
</head>
<body>
 
 <div class="container">
    <div class="list">

        <div class="heading">To-Do List</div>

        <div class="inputbox">
            <input type="text" name="display" placeholder="Add Your Task" id="box">
            <button class="add-button">Add</button>
        </div>

        <div class="task-list">
            <ul id="list-container">
            </ul>
        </div>

        <div class="taskCounter">
            <p id="task-counts">
                <span id="total-count">Total:0</span>
                <span id="completed-count">Completed:0</span>
                <span id="remaining-count">Remaining:0</span>
            </p>
        </div>
    </div>
 }                                                                                                                                          
<script src="script.js"></script>
</body>
</html>
