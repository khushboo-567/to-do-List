<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 
 <div class="container">
    <div class="list">
        <div class="heading">To-Do List</div>
        <div class="inputbox">
            <input type="text" name="display" placeholder="Add Your Task" id="box">
            <button>Add</button>
        </div>
        <div class="task-list">
            <ul id="list-container">
            </ul>
        </div>
    </div>
 </div>
    
<script src="script.js"></script>
</body>
</html>
